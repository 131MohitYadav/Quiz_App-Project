<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Profile.css">
    <title>Document</title>
</head>
<body>


    <section class="profile-section">
        <div class = "profile-card">

            <div  class = "profile-header">
                <img src = "https://i.pravatar.cc/150?img=12" class = "profile-img" >


                <div class="profile-info">
                    <h2 id="username">Mohit Yadav</h2>
                    <p id="email">mohit@gmail.com</p>

                    <span class ="rank">👑 Gold Member</span>

                    
                </div>
        </div>

        <div class = "stats">
            <div class="box">
                <h3 id = "score">1250</h3>
                <p>Total Score</p>
            </div>

            <div class="box">
                <h3 id="quiz">38</h3>
                <p>Quiz Completed</p>
            </div>

            <div class="box">
                <h3 id="badge">12</h3>
                <p>Badges</p>
            </div>

        </div>


        <div class="progress-area">
            <h3>Learning Progress</h3>

            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <span id="progressText">75%</span>
        </div>

        <div class="buttons">
            <button onclick="editProfile()">Edit Profile</button>
            <button class="logout" onclick="logout()">Logout</button>

        </div>
    </div>

    <div class="activity-card">
    <h2>Recent Activity</h2>

    <ul>
     <li>✅ Java Quiz Completed</li>
            <li>🏅 Earned Python Badge</li>
            <li>🔥 5 Days Streak</li>
            <li>⭐ Scored 95% in HTML Quiz</li>
    </ul>

    </section>

</div>
    
</body>
</html>
