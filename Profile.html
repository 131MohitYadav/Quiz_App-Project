<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile</title>

<link rel="stylesheet" href="Profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<div class="top">

<img src="profile.png" id="photo">

<h2 id="name">Loading...</h2>

<p id="email"></p>

<span id="rank"></span>

</div>

<div class="stats">

<div class="box">

<h2 id="score"></h2>

<p>Total Score</p>

</div>

<div class="box">

<h2 id="quiz"></h2>

<p>Quiz</p>

</div>

<div class="box">

<h2 id="percentage"></h2>

<p>Percentage</p>

</div>

</div>

<div class="details">

<h3>User Details</h3>

<table>

<tr>

<td><i class="fa-solid fa-user"></i> Age</td>

<td id="age"></td>

</tr>

<tr>

<td><i class="fa-solid fa-phone"></i> Mobile</td>

<td id="mobile"></td>

</tr>

<tr>

<td><i class="fa-solid fa-location-dot"></i> City</td>

<td id="city"></td>

</tr>

<tr>

<td><i class="fa-solid fa-award"></i> Result</td>

<td id="result"></td>

</tr>

</table>

</div>

<div class="progress-area">

<h3>Learning Progress</h3>

<div class="progress">

<div id="bar"></div>

</div>

<span id="progressText"></span>

</div>

<div class="buttons">

<button onclick="editProfile()">

Edit Profile

</button>

<button onclick="logout()">

Logout

</button>

</div>

</div>

<div class="right">



<script src="Profile.js"></script>

</body>
</html>
