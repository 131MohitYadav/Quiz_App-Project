<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>
<link rel="stylesheet" href="Profile.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="container">

  <!-- LEFT: Profile card -->
  <div class="left">
    <div class="top">
      <img id="photo" src="https://api.dicebear.com/7.x/initials/svg?seed=Student" alt="Profile Photo">
      <h2 id="studentName">Loading...</h2>
      <span id="rank">--</span>
    </div>

    <div class="stats">
      <div class="box">
        <h2 id="totalScore">--</h2>
        <p>Total Score</p>
      </div>
      <div class="box">
        <h2 id="quizName">--</h2>
        <p>Quiz</p>
      </div>
      <div class="box">
        <h2 id="percentage">--</h2>
        <p>Percentage</p>
      </div>
    </div>

    <div class="details">
      <h3>User Details</h3>
      <table>
        <tr>
          <td>👤 Age</td>
          <td id="userAge">--</td>
        </tr>
        <tr>
          <td>📞 Mobile</td>
          <td id="userMobile">--</td>
        </tr>
        <tr>
          <td>📍 City</td>
          <td id="userCity">--</td>
        </tr>
        <tr>
          <td>🏅 Result</td>
          <td id="userResult">--</td>
        </tr>
      </table>
    </div>

    <div class="progress-area">
      <h3>Learning Progress</h3>
      <div class="progress">
        <div id="bar"></div>
      </div>
    </div>

    <div class="buttons">
      <button id="editBtn">Edit Profile</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- RIGHT: Recent activity -->
  <div class="right">
    <h3>Recent Activity</h3>
    <div id="activityList">
      <div class="activity">No recent activity yet.</div>
    </div>
  </div>

</div>

<script src="Profile.js"></script>
</body>
</html>
